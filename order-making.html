<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸運大輪盤</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        
        /* 輪盤容器 */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        canvas { border-radius: 50%; border: 5px solid #333; }
        /* 指針 */
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #ff4757; z-index: 10;
        }

        button {
            background: #1e90ff; color: white; border: none; padding: 10px 25px;
            border-radius: 25px; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #3742fa; transform: scale(1.05); }
        
        #winner { margin-top: 15px; font-size: 24px; font-weight: bold; color: #ff4757; min-height: 32px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎡 幸運大輪盤</h2>
    <textarea id="itemsInput" placeholder="請輸入選項（一行一個）">小明&#10;小華&#10;大強&#10;老王&#10;阿珍</textarea>
    
    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>

    <button id="spinBtn" onclick="spinWheel()">開始轉動！</button>
    <div id="winner"></div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('itemsInput');
    const winnerDiv = document.getElementById('winner');
    const spinBtn = document.getElementById('spinBtn');

    let currentAngle = 0;
    let isSpinning = false;

    // 隨機顏色產生器
    const colors = ["#ff9f43", "#ee5253", "#0abde3", "#10ac84", "#5f27cd", "#ff9ff3", "#feca57", "#48dbfb"];

    function drawWheel() {
        const items = input.value.trim().split('\n').filter(i => i.trim() !== "");
        if (items.length === 0) return;

        const arc = (Math.PI * 2) / items.length;
        const radius = canvas.width / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        items.forEach((text, i) => {
            const angle = currentAngle + i * arc;
            
            // 畫扇形
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(radius, radius);
            ctx.arc(radius, radius, radius, angle, angle + arc);
            ctx.fill();
            ctx.stroke();

            // 畫文字
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(angle + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(text, radius - 10, 10);
            ctx.restore();
        });
    }

    function spinWheel() {
        if (isSpinning) return;
        
        const items = input.value.trim().split('\n').filter(i => i.trim() !== "");
        if (items.length < 2) {
            alert("請至少輸入兩個選項！");
            return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        winnerDiv.textContent = "轉動中...";

        const spinRotation = Math.random() * 360 + 1440; // 至少轉 4 圈
        const duration = 4000; // 轉動 4 秒
        let start = null;

        function animate(timestamp) {
            if (!start) start = timestamp;
            const elapsed = timestamp - start;
            const progress = Math.min(elapsed / duration, 1);
            
            // 緩動函數 (Ease-out)，由快到慢
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const rotation = (spinRotation * easeOut) * (Math.PI / 180);

            currentAngle += rotation * 0.05; // 加上旋轉增量
            drawWheel();

            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                isSpinning = false;
                spinBtn.disabled = false;
                determineWinner(items);
            }
        }
        requestAnimationFrame(animate);
    }

    function determineWinner(items) {
        const arc = (Math.PI * 2) / items.length;
        // 計算指針（在圓頂端，即 -90 度處）指向哪一個扇形
        // 由於我們是順時針轉，角度需要做倒推計算
        let normalizedAngle = (currentAngle % (Math.PI * 2));
        if (normalizedAngle < 0) normalizedAngle += (Math.PI * 2);
        
        // 指針在上方 (1.5 * PI)，所以計算相對位置
        const index = Math.floor(( (Math.PI * 1.5) - normalizedAngle + (Math.PI * 10)) / arc) % items.length;
        winnerDiv.textContent = "🎉 恭喜：" + items[index];
    }

    // 監聽輸入框變化，即時更新輪盤
    input.addEventListener('input', drawWheel);
    
    // 初始化
    drawWheel();
</script>

</body>
</html>
